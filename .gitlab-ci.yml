stages:
  - security
  - format
  - lint
  - test
  - build

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .pip-cache/

# ── Security Stage ────────────────────────────────────────────────────────────
security_gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - echo "Running Gitleaks secret detection..."
    - gitleaks detect --verbose --source=.

security_bandit:
  stage: security
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir .pip-cache bandit
  script:
    - echo "Running Bandit security analysis..."
    - bandit -r utils/ app.py pages/

# ── Format Stage ──────────────────────────────────────────────────────────────
format_ruff:
  stage: format
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir .pip-cache ruff
  script:
    - echo "Checking code formatting with Ruff..."
    - ruff format --check .

# ── Lint Stage ────────────────────────────────────────────────────────────────
lint_ruff:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir .pip-cache ruff
  script:
    - echo "Running Ruff lint checks..."
    - ruff check .

lint_mypy:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir .pip-cache -r requirements.txt
    - pip install --cache-dir .pip-cache mypy
  script:
    - echo "Running MyPy type checks..."
    - mypy .

# ── Test Stage ───────────────────────────────────────────────────────────────
test_stage:
  stage: test
  image: python:3.11-slim
  before_script:
    - echo "Checking Python version..."
    - python --version
    - echo "Installing dependencies from requirements.txt..."
    - pip install --cache-dir .pip-cache -r requirements.txt
  script:
    - echo "Validating syntax of all Python files..."
    - python -m py_compile $(find . -name "*.py")
    - echo "Running the full pytest suite..."
    - pytest tests/ -v --tb=short

# ── Build Stage ──────────────────────────────────────────────────────────────
build_stage:
  stage: build
  image: python:3.11-slim
  before_script:
    - echo "Installing dependencies..."
    - pip install --cache-dir .pip-cache -r requirements.txt
  script:
    - echo "Running project-wide compilation checks..."
    - python -m compileall .
    - echo "Verifying core and third-party module imports..."
    - pytest tests/test_imports.py -v --tb=short
