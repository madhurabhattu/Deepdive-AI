stages:
  - test
  - build

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .pip-cache/

# ── Test Stage ───────────────────────────────────────────────────────────────
test_stage:
  stage: test
  image: python:3.11-slim
  before_script:
    - echo "Checking Python version..."
    - python --version
    - echo "Installing dependencies from requirements.txt..."
    - pip install --cache-dir .pip-cache -r requirements.txt
  script:
    - echo "Validating syntax of all Python files..."
    - python -m py_compile $(find . -name "*.py")
    - echo "Running the full pytest suite..."
    - pytest tests/ -v --tb=short

# ── Build Stage ──────────────────────────────────────────────────────────────
build_stage:
  stage: build
  image: python:3.11-slim
  before_script:
    - echo "Installing dependencies..."
    - pip install --cache-dir .pip-cache -r requirements.txt
  script:
    - echo "Running project-wide compilation checks..."
    - python -m compileall .
    - echo "Verifying core and third-party module imports..."
    - pytest tests/test_imports.py -v --tb=short
